papers:
  - title: "OPEXUS FOIAXpress Public Access Link (PAL) unauthenticated username enumeration"
    summary: "OPEXUS FOIAXpress Public Access Link (PAL) version v11.1.0 allows an unauthenticated, remote attacker to query the /App/CreateRequest.aspx endpoint to check for the existence of valid usernames. There are no rate-limiting mechanisms in place."
    image: "/images/CVE.svg"
    date: "2025-07-31"
    links:
      - label: "CVE Record"
        url: "https://www.cve.org/CVERecord?id=CVE-2025-54834"

  - title: "OPEXUS FOIAXpress Public Access Link (PAL) account-lockout and CAPTCHA protection bypass"
    summary: "OPEXUS FOIAXpress Public Access Link (PAL) version v11.1.0 allows attackers to bypass account-lockout and CAPTCHA protections. Unauthenticated remote attackers can more easily brute force passwords."
    image: "/images/CVE.svg"
    date: "2025-07-31"
    links:
      - label: "CVE Record"
        url: "https://www.cve.org/CVERecord?id=CVE-2025-54833"

  - title: "OPEXUS FOIAXpress Public Access Link (PAL) state and territory list unauthorized modification"
    summary: "OPEXUS FOIAXpress Public Access Link (PAL), version v11.1.0, allows an authenticated user to add entries to the list of states and territories."
    image: "/images/CVE.svg"
    date: "2025-07-31"
    links:
      - label: "CVE Record"
        url: "https://www.cve.org/CVERecord?id=CVE-2025-54832"


